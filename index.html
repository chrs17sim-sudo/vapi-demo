<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vapi Demo</title>

    <script
      src="https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js"
      defer
      async
    ></script>
  </head>

  <body>
    <h1>Vapi Demo</h1>
    <p>Click the widget in the bottom-right to start a call.</p>

    <script>
  function startWidget() {
    if (!window.vapiSDK) return setTimeout(startWidget, 200);

    window.vapiSDK.run({
      apiKey: "YOUR_PUBLIC_VAPI_KEY",
      assistant: "20d6b459-5199-4bbd-b1df-9a8cf169aa99",
      config: { position: "bottom-right" }
    });
  }
  startWidget();
</script>
  </body>
</html>
