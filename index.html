<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vapi Demo</title>

    <script
      src="https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js"
      defer
      async
    ></script>
  </head>

  <body>
    <h1>Vapi Demo</h1>
    <p>Click the widget in the bottom-right to start a call.</p>

    <script>
      window.addEventListener("load", () => {
        window.vapiSDK.run({
          apiKey: "PASTE_YOUR_VAPI_PUBLIC_KEY_HERE",
          assistant: "20d6b459-5199-4bbd-b1df-9a8cf169aa99",
          config: { position: "bottom-right" }
        });
      });
    </script>
  </body>
</html>
