<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vapi Demo (Fields + Widget)</title>
    <link rel="icon" href="data:," />

    <script
      src="https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js"
      defer
      async
    ></script>

    <style>
      body { font-family: system-ui, Arial; padding: 24px; max-width: 820px; margin: 0 auto; }
      label { display: block; margin-top: 12px; font-weight: 600; }
      input { width: 100%; padding: 10px; margin-top: 6px; font-size: 14px; }
      button { padding: 10px 14px; margin-top: 14px; margin-right: 10px; }
      #status { margin-top: 14px; padding: 10px; background: #f6f8fa; border-radius: 8px; white-space: pre-wrap; }
      #debug { margin-top: 14px; padding: 10px; background: #0b1020; color: #d6e1ff; border-radius: 8px; white-space: pre-wrap;
               font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
      small { display: block; margin-top: 6px; color: #555; }
      code { background: #f6f8fa; padding: 2px 6px; border-radius: 6px; }
    </style>
  </head>

  <body>
    <h1>Vapi Demo</h1>
    <p>Start will open the Vapi widget in the <b>bottom-right</b>.</p>

    <label for="publicKey">Vapi Public Key</label>
    <input id="publicKey" placeholder="Paste Vapi PUBLIC key here" autocomplete="off" />
    <small>Use a Public key only.</small>

    <label for="assistantId">Assistant ID</label>
    <input
      id="assistantId"
      value="20d6b459-5199-4bbd-b1df-9a8cf169aa99"
      placeholder="assistant-id"
      autocomplete="off"
    />

    <div>
      <button id="startBtn">Start (show widget)</button>
      <button id="stopBtn" disabled>Stop (remove widget)</button>
    </div>

    <div id="status">Status: idle</div>
    <div id="debug">Debug log:</div>

    <script>
      const statusEl = document.getElementById("status");
      const debugEl = document.getElementById("debug");
      const startBtn = document.getElementById("startBtn");
      const stopBtn = document.getElementById("stopBtn");
      const publicKeyEl = document.getElementById("publicKey");
      const assistantIdEl = document.getElementById("assistantId");

      let running = false;

      function log(msg, obj) {
        console.log(msg, obj || "");
        debugEl.textContent += `\n${msg}${obj ? " " + JSON.stringify(obj, null, 2) : ""}`;
      }
      function setStatus(text) { statusEl.textContent = `Status: ${text}`; }
      function setButtons() { startBtn.disabled = running; stopBtn.disabled = !running; }

      function waitForSDK(cb, tries = 60) {
        if (window.vapiSDK && typeof window.vapiSDK.run === "function") return cb();
        if (tries <= 0) return setStatus("vapiSDK not loaded (check Network tab)");
        setTimeout(() => waitForSDK(cb, tries - 1), 200);
      }

      function removeWidget() {
        // Remove injected widget custom element if present
        document.querySelectorAll("vapi-widget").forEach(el => el.remove());

        // Also remove likely injected floating containers/iframes (best-effort cleanup)
        document.querySelectorAll("iframe").forEach(f => {
          const src = (f.getAttribute("src") || "").toLowerCase();
          if (src.includes("daily") || src.includes("vapi")) f.remove();
        });
      }

      startBtn.addEventListener("click", () => {
        const apiKey = publicKeyEl.value.trim();
        const assistant = assistantIdEl.value.trim();

        if (!apiKey) return setStatus("missing public key");
        if (!assistant) return setStatus("missing assistant id");

        setStatus("loading sdk...");
        waitForSDK(() => {
          try {
            log("vapiSDK loaded", { hasRun: typeof window.vapiSDK.run === "function" });

            // clear any previous widget
            removeWidget();

            setStatus("creating widget...");
            window.vapiSDK.run({
              apiKey,
              assistant,
              config: { position: "bottom-right" }
            });

            running = true;
            setButtons();
            setStatus("widget created (bottom-right). Click it to start/stop the call.");
            log("widget created", { assistant });
          } catch (e) {
            log("Start failed", { message: e?.message, stack: e?.stack });
            setStatus("start failed (see console/debug log)");
          }
        });
      });

      stopBtn.addEventListener("click", () => {
        removeWidget();
        running = false;
        setButtons();
        setStatus("stopped (widget removed)");
        log("widget removed");
      });

      window.addEventListener("error", (e) => log("window.onerror", { message: e.message }));
      setButtons();
    </script>
  </body>
</html>
