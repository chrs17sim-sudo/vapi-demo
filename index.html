<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vapi Demo</title>
    <link rel="icon" href="data:," />

    <script
      src="https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js"
      defer
      async
    ></script>

    <style>
      body { font-family: system-ui, Arial; padding: 24px; max-width: 920px; margin: 0 auto; }
      label { display: block; margin-top: 12px; font-weight: 600; }
      input { width: 100%; padding: 10px; margin-top: 6px; font-size: 14px; }
      button { padding: 10px 14px; margin-top: 14px; margin-right: 10px; }
      #status { margin-top: 14px; padding: 10px; background: #f6f8fa; border-radius: 8px; white-space: pre-wrap; }
      #debug { margin-top: 14px; padding: 10px; background: #0b1020; color: #d6e1ff; border-radius: 8px; white-space: pre-wrap;
               font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
      #widgetMount { margin-top: 18px; padding: 14px; border: 1px solid #ddd; border-radius: 10px; min-height: 120px; }
      .hint { color: #555; margin-top: 6px; font-size: 13px; }
    </style>
  </head>

  <body>
    <h1>Vapi Demo</h1>

    <label for="publicKey">Vapi Public Key</label>
    <input id="publicKey" placeholder="Paste Vapi PUBLIC key here" autocomplete="off" />
    <div class="hint">Use a Public key only.</div>

    <label for="assistantId">Assistant ID</label>
    <input
      id="assistantId"
      value="20d6b459-5199-4bbd-b1df-9a8cf169aa99"
      placeholder="assistant-id"
      autocomplete="off"
    />

    <div>
      <button id="startBtn">Start</button>
      <button id="stopBtn" disabled>Stop (remove widget)</button>
    </div>

    <div id="status">Status: idle</div>
    <div id="debug">Debug log:</div>

    <h2>Widget (inline)</h2>
    <div id="widgetMount">Widget will render here after you click Start.</div>

    <script>
      const statusEl = document.getElementById("status");
      const debugEl = document.getElementById("debug");
      const startBtn = document.getElementById("startBtn");
      const stopBtn = document.getElementById("stopBtn");
      const publicKeyEl = document.getElementById("publicKey");
      const assistantIdEl = document.getElementById("assistantId");
      const widgetMount = document.getElementById("widgetMount");

      let running = false;

      function log(msg, obj) {
        const line = obj ? `${msg} ${JSON.stringify(obj, null, 2)}` : msg;
        console.log(msg, obj || "");
        debugEl.textContent += `\n${line}`;
      }
      function setStatus(text) { statusEl.textContent = `Status: ${text}`; }
      function setButtons() { startBtn.disabled = running; stopBtn.disabled = !running; }

      function waitForSDK(cb, tries = 60) {
        if (window.vapiSDK && typeof window.vapiSDK.run === "function") return cb();
        if (tries <= 0) return setStatus("vapiSDK not loaded (check Network tab)");
        setTimeout(() => waitForSDK(cb, tries - 1), 200);
      }

      function removeWidget() {
        // Remove any injected vapi-widget elements
        document.querySelectorAll("vapi-widget").forEach(el => el.remove());
        // Clear mount area
        widgetMount.innerHTML = "Widget removed. Click Start to render again.";
      }

      startBtn.addEventListener("click", () => {
        const apiKey = publicKeyEl.value.trim();
        const assistant = assistantIdEl.value.trim();

        if (!apiKey) return setStatus("missing public key");
        if (!assistant) return setStatus("missing assistant id");

        setStatus("loading sdk...");
        waitForSDK(() => {
          try {
            log("vapiSDK loaded:", { hasRun: typeof window.vapiSDK.run === "function" });

            // Clear any previous widget
            removeWidget();

            // Create a mount element that the script-tag widget can use
            // We render inline by injecting a <vapi-widget> element
            const el = document.createElement("vapi-widget");
            el.setAttribute("data-api-key", apiKey);
            el.setAttribute("data-assistant", assistant);
            el.setAttribute("data-position", "inline"); // force visible render
            widgetMount.innerHTML = "";
            widgetMount.appendChild(el);

            running = true;
            setButtons();
            setStatus("widget rendered (inline) — click it to start the call");

          } catch (e) {
            log("Start failed:", { message: e?.message, stack: e?.stack });
            setStatus("start failed (see console)");
          }
        });
      });

      stopBtn.addEventListener("click", () => {
        removeWidget();
        running = false;
        setButtons();
        setStatus("stopped");
      });

      window.addEventListener("error", (e) => log("window.onerror:", { message: e.message }));
      setButtons();
    </script>
  </body>
</html>
