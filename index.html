<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vapi Demo (Script Load Debug)</title>
    <link rel="icon" href="data:," />

    <style>
      body { font-family: system-ui, Arial; padding: 24px; max-width: 820px; margin: 0 auto; }
      label { display: block; margin-top: 12px; font-weight: 600; }
      input { width: 100%; padding: 10px; margin-top: 6px; font-size: 14px; }
      button { padding: 10px 14px; margin-top: 14px; margin-right: 10px; }
      #status { margin-top: 14px; padding: 10px; background: #f6f8fa; border-radius: 8px; white-space: pre-wrap; }
      #debug { margin-top: 14px; padding: 10px; background: #0b1020; color: #d6e1ff; border-radius: 8px; white-space: pre-wrap;
               font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
      #widgetSlot { margin-top: 18px; padding: 12px; border: 1px dashed #bbb; border-radius: 10px; min-height: 90px; }
      small { display: block; margin-top: 6px; color: #555; }
    </style>
  </head>

  <body>
    <h1>Vapi Demo</h1>

    <div id="status">Status: loading Vapi widget script…</div>
    <div id="debug">Debug log:</div>

    <label for="publicKey">Vapi Public Key</label>
    <input id="publicKey" placeholder="Paste Vapi PUBLIC key here" autocomplete="off" />
    <small>Use a Public key only.</small>

    <label for="assistantId">Assistant ID</label>
    <input id="assistantId" value="20d6b459-5199-4bbd-b1df-9a8cf169aa99" autocomplete="off" />

    <div>
      <button id="startBtn">Start (insert widget)</button>
      <button id="stopBtn" disabled>Stop</button>
    </div>

    <h2>Widget slot</h2>
    <div id="widgetSlot">Widget will appear here.</div>

    <script>
      const statusEl = document.getElementById("status");
      const debugEl = document.getElementById("debug");
      const widgetSlot = document.getElementById("widgetSlot");
      const startBtn = document.getElementById("startBtn");
      const stopBtn = document.getElementById("stopBtn");
      const publicKeyEl = document.getElementById("publicKey");
      const assistantIdEl = document.getElementById("assistantId");

      function log(msg, obj) {
        console.log(msg, obj || "");
        debugEl.textContent += `\n${msg}${obj ? " " + JSON.stringify(obj, null, 2) : ""}`;
      }
      function setStatus(text) { statusEl.textContent = `Status: ${text}`; }

      // Load the Vapi widget script with explicit success/failure callbacks
      const scriptUrl = "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
      const s = document.createElement("script");
      s.src = scriptUrl;
      s.onload = () => {
        const registered = !!(window.customElements && customElements.get("vapi-widget"));
        setStatus(`widget script loaded. vapi-widget registered = ${registered}`);
        log("script loaded", { scriptUrl, registered });
      };
      s.onerror = (e) => {
        setStatus("FAILED to load widget script (see debug log)");
        log("script failed to load", { scriptUrl, error: String(e) });
      };
      document.head.appendChild(s);

      function removeWidget() {
        widgetSlot.querySelectorAll("vapi-widget").forEach(el => el.remove());
      }

      startBtn.addEventListener("click", () => {
        const apiKey = publicKeyEl.value.trim();
        const assistant = assistantIdEl.value.trim();

        if (!apiKey) return setStatus("missing public key");
        if (!assistant) return setStatus("missing assistant id");

        const registered = !!(window.customElements && customElements.get("vapi-widget"));
        if (!registered) return setStatus("vapi-widget not registered (script still not loaded)");

        removeWidget();
        const el = document.createElement("vapi-widget");
        el.setAttribute("api-key", apiKey);
        el.setAttribute("assistant", assistant);

        widgetSlot.innerHTML = "";
        widgetSlot.appendChild(el);

        stopBtn.disabled = false;
        setStatus("inserted <vapi-widget> into widget slot");
        log("inserted widget", { assistant });
      });

      stopBtn.addEventListener("click", () => {
        removeWidget();
        stopBtn.disabled = true;
        setStatus("stopped (widget removed)");
        log("removed widget");
      });
    </script>
  </body>
</html>
