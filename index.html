<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vapi Demo (Start/Stop)</title>

    <link rel="icon" href="data:," />

    <style>
      body { font-family: system-ui, Arial; padding: 24px; max-width: 820px; margin: 0 auto; }
      label { display: block; margin-top: 12px; font-weight: 600; }
      input { width: 100%; padding: 10px; margin-top: 6px; font-size: 14px; }
      button { padding: 10px 14px; margin-top: 14px; margin-right: 10px; }
      #status { margin-top: 14px; padding: 10px; background: #f6f8fa; border-radius: 8px; white-space: pre-wrap; }
      #debug { margin-top: 14px; padding: 10px; background: #0b1020; color: #d6e1ff; border-radius: 8px; white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
      small { display: block; margin-top: 6px; color: #555; }
      code { background: #f6f8fa; padding: 2px 6px; border-radius: 6px; }
    </style>
  </head>

  <body>
    <h1>Vapi Demo</h1>
    <p>This page loads the Vapi Web SDK via ESM (more reliable than UMD on some setups).</p>

    <label>Vapi Public Key</label>
    <input id="publicKey" placeholder="Paste Vapi PUBLIC key here" autocomplete="off" />
    <small>Use a <b>Public</b> key only (safe for browser). Never paste a Private key here.</small>

    <label>Assistant ID</label>
    <input
      id="assistantId"
      value="20d6b459-5199-4bbd-b1df-9a8cf169aa99"
      placeholder="assistant-id"
      autocomplete="off"
    />

    <div>
      <button id="startBtn">Start Call</button>
      <button id="stopBtn" disabled>Stop Call</button>
    </div>

    <div id="status">Status: idle</div>
    <div id="debug">Debug log:\n</div>

    <!-- Load Vapi Web SDK (ESM) -->
    <script type="module">
      const debugEl = document.getElementById("debug");
      const statusEl = document.getElementById("status");
      const startBtn = document.getElementById("startBtn");
      const stopBtn = document.getElementById("stopBtn");
      const publicKeyEl = document.getElementById("publicKey");
      const assistantIdEl = document.getElementById("assistantId");

      function log(...args) {
        console.log(...args);
        debugEl.textContent += args.map(a => typeof a === "string" ? a : JSON.stringify(a, null, 2)).join(" ") + "\n";
      }
      function setStatus(text) {
        statusEl.textContent = `Status: ${text}`;
      }

      let vapi = null;
      let isInCall = false;

      function setButtons() {
        startBtn.disabled = isInCall;
        stopBtn.disabled = !isInCall;
      }

      // Try multiple ESM CDNs for resilience
      async function importVapi() {
        const urls = [
          "https://cdn.skypack.dev/@vapi-ai/web",
          "https://esm.sh/@vapi-ai/web",
          "https://unpkg.com/@vapi-ai/web?module"
        ];

        for (const url of urls) {
          try {
            log(`Trying import: ${url}`);
            const mod = await import(url);
            const VapiCtor = mod?.default || mod?.Vapi || mod;
            if (VapiCtor) {
              log("Loaded Vapi SDK from:", url);
              return VapiCtor;
            }
          } catch (e) {
            log("Import failed:", url, String(e?.message || e));
          }
        }
        return null;
      }

      const VapiCtor = await importVapi();
      log("VapiCtor type:", typeof VapiCtor);

      if (!VapiCtor) {
        setStatus("Vapi SDK failed to load (see debug log)");
        setButtons();
        throw new Error("Vapi SDK failed to load from all CDNs");
      } else {
        setStatus("SDK loaded (ready)");
      }

      function attachListeners(client) {
        client.on("call-start", () => {
          isInCall = true;
          setButtons();
          setStatus("in call");
        });

        client.on("call-end", () => {
          isInCall = false;
          setButtons();
          setStatus("ended");
        });

        client.on("error", (e) => {
          log("Vapi error event:", e);
          setStatus("error (see debug log)");
        });
      }

      startBtn.addEventListener("click", async () => {
        const publicKey = publicKeyEl.value.trim();
        const assistantId = assistantIdEl.value.trim();

        if (!publicKey) return setStatus("missing public key");
        if (!assistantId) return setStatus("missing assistant id");

        try {
          if (!vapi) {
            vapi = new VapiCtor(publicKey);
            attachListeners(vapi);
            log("Created Vapi client");
          }

          setStatus("starting...");
          log("Starting with assistantId:", assistantId);
          await vapi.start(assistantId);
        } catch (e) {
          log("Start failed:", e?.stack || String(e));
          setStatus("failed to start (see debug log)");
        }
      });

      stopBtn.addEventListener("click", async () => {
        try {
          if (!vapi) return;
          setStatus("stopping...");
          await vapi.stop();
        } catch (e) {
          log("Stop failed:", e?.stack || String(e));
          setStatus("failed to stop (see debug log)");
        }
      });

      setButtons();
      log("Page initialized.");
    </script>
  </body>
</html>
