<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vapi Voice Demo</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 16px; }
      button { padding: 12px 16px; margin-right: 8px; font-size: 16px; cursor: pointer; }
      #status { margin-top: 16px; padding: 10px 12px; background: #f5f5f5; border-radius: 8px; }
      #log { margin-top: 12px; white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size: 12px; }
      #build { margin-top: 8px; font-size: 12px; color: #666; }
      input { padding: 10px 12px; width: 100%; max-width: 520px; font-size: 14px; }
      label { display:block; margin: 16px 0 6px; font-weight: 600; }
    </style>
  </head>

  <body>
    <h1>Vapi Voice Demo</h1>

    <label for="publicKey">Vapi Public Key</label>
    <input id="publicKey" placeholder="Paste your Vapi PUBLIC key" />

    <label for="assistantId">Assistant ID</label>
    <input id="assistantId" placeholder="Paste your assistant id (asst_...)" />

    <div style="margin-top:16px;">
      <button id="startBtn">Start voice demo</button>
      <button id="stopBtn">Stop</button>
    </div>

    <div id="status">Status: idle</div>
    <div id="log"></div>
    <div id="build"></div>

    <script type="module">
      import Vapi from "https://esm.sh/@vapi-ai/web@2";

      const statusEl = document.getElementById("status");
      const logEl = document.getElementById("log");
      const buildEl = document.getElementById("build");

      const startBtn = document.getElementById("startBtn");
      const stopBtn = document.getElementById("stopBtn");
      const publicKeyEl = document.getElementById("publicKey");
      const assistantIdEl = document.getElementById("assistantId");

      function setStatus(s) {
        statusEl.textContent = `Status: ${s}`;
      }

      function log(obj) {
        try {
          logEl.textContent =
            `${new Date().toISOString()}  ${JSON.stringify(obj, null, 2)}\n\n` +
            logEl.textContent;
        } catch {
          logEl.textContent =
            `${new Date().toISOString()}  ${String(obj)}\n\n` + logEl.textContent;
        }
      }

      // Build marker (helps confirm you're seeing the latest deployed page)
      if (buildEl) buildEl.textContent = `Build: ${new Date().toISOString()}`;

      setStatus("ready");
      log({ event: "script-loaded", vapiType: typeof Vapi });

      let vapi = null;

      startBtn.onclick = async () => {
        log({ event: "start-clicked" });

        const publicKey = publicKeyEl.value.trim();
        const assistantId = assistantIdEl.value.trim();

        if (!publicKey) return setStatus("missing public key");
        if (!assistantId) return setStatus("missing assistant id");

        try {
          setStatus("starting...");
          vapi = new Vapi(publicKey);

          vapi.on("call-start", () => {
            setStatus("in call");
            log({ event: "call-start" });
          });

          vapi.on("call-end", () => {
            setStatus("ended");
            log({ event: "call-end" });
          });

          vapi.on("error", (e) => {
            setStatus("error");
            log({ event: "error", error: e });
          });

          vapi.on("message", (m) => log({ event: "message", message: m }));

          await vapi.start(assistantId);
        } catch (e) {
          setStatus("start failed");
          log({ event: "start failed", error: { message: e?.message, stack: e?.stack } });
        }
      };

stopBtn.onclick = async () => {
  try {
    setStatus("stopping...");
    log({ event: "stop-clicked" });

    if (!vapi) {
      setStatus("idle");
      return;
    }

    // Some SDK versions return a promise; await handles both promise/non-promise.
    await vapi.stop();

    setStatus("idle");
    log({ event: "stopped" });
    vapi = null;
  } catch (e) {
    setStatus("stop failed");
    log({ event: "stop failed", error: { message: e?.message, stack: e?.stack } });
  }
};
        try {
          setStatus("stopping...");
          vapi?.stop();
        } catch (e) {
          setStatus("stop failed");
          log({ event: "stop failed", error: { message: e?.message, stack: e?.stack } });
        }
      };
    </script>
  </body>
</html>
