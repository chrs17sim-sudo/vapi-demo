<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vapi Demo (Run + Verify)</title>
    <link rel="icon" href="data:," />

    <style>
      body { font-family: system-ui, Arial; padding: 24px; max-width: 820px; margin: 0 auto; }
      label { display: block; margin-top: 12px; font-weight: 600; }
      input { width: 100%; padding: 10px; margin-top: 6px; font-size: 14px; }
      button { padding: 10px 14px; margin-top: 14px; margin-right: 10px; }
      #status { margin-top: 14px; padding: 10px; background: #f6f8fa; border-radius: 8px; white-space: pre-wrap; }
      #debug { margin-top: 14px; padding: 10px; background: #0b1020; color: #d6e1ff; border-radius: 8px; white-space: pre-wrap;
               font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
      code { background: #f6f8fa; padding: 2px 6px; border-radius: 6px; }
    </style>
  </head>

  <body>
    <h1>Vapi Demo</h1>

    <label for="publicKey">Vapi Public Key</label>
    <input id="publicKey" placeholder="Paste Vapi PUBLIC key here" autocomplete="off" />

    <label for="assistantId">Assistant ID</label>
    <input id="assistantId" value="20d6b459-5199-4bbd-b1df-9a8cf169aa99" autocomplete="off" />

    <div>
      <button id="startBtn">Start (vapiSDK.run)</button>
      <button id="checkBtn">Check injected elements</button>
    </div>

    <div id="status">Status: loading widget script…</div>
    <div id="debug">Debug log:</div>

    <script>
      const statusEl = document.getElementById("status");
      const debugEl = document.getElementById("debug");
      const publicKeyEl = document.getElementById("publicKey");
      const assistantIdEl = document.getElementById("assistantId");
      const startBtn = document.getElementById("startBtn");
      const checkBtn = document.getElementById("checkBtn");

      function log(msg, obj) {
        console.log(msg, obj || "");
        debugEl.textContent += `\n${msg}${obj ? " " + JSON.stringify(obj, null, 2) : ""}`;
      }
      function setStatus(text) { statusEl.textContent = `Status: ${text}`; }

      // Load script explicitly
      const scriptUrl = "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
      const s = document.createElement("script");
      s.src = scriptUrl;

      s.onload = () => {
        const hasSDK = !!window.vapiSDK;
        const hasRun = !!(window.vapiSDK && typeof window.vapiSDK.run === "function");
        setStatus(`script loaded. vapiSDK=${hasSDK} run=${hasRun}`);
        log("script loaded", { scriptUrl, hasSDK, hasRun });
      };

      s.onerror = (e) => {
        setStatus("FAILED to load widget script");
        log("script failed", { scriptUrl, error: String(e) });
      };

      document.head.appendChild(s);

      function checkInjected() {
        const widgets = document.querySelectorAll("vapi-widget").length;
        const iframes = Array.from(document.querySelectorAll("iframe")).map(f => f.src).slice(0, 10);
        const buttons = Array.from(document.querySelectorAll("button")).map(b => b.textContent).slice(0, 20);

        log("injected check", { vapiWidgetCount: widgets, iframeSrcs: iframes, pageButtons: buttons });
        setStatus(`checked. vapi-widget=${widgets}, iframes=${iframes.length} (see debug log)`);
      }

      startBtn.addEventListener("click", () => {
        const apiKey = publicKeyEl.value.trim();
        const assistant = assistantIdEl.value.trim();

        if (!apiKey) return setStatus("missing public key");
        if (!assistant) return setStatus("missing assistant id");
        if (!window.vapiSDK || typeof window.vapiSDK.run !== "function") {
          return setStatus("vapiSDK.run not available (script not ready)");
        }

        try {
          setStatus("calling vapiSDK.run...");
          log("calling vapiSDK.run", { assistant });

          window.vapiSDK.run({
            apiKey,
            assistant,
            config: { position: "bottom-right" }
          });

          setStatus("vapiSDK.run called. Now check injection.");
          // check after a moment
          setTimeout(checkInjected, 800);
        } catch (e) {
          setStatus("vapiSDK.run threw error (see debug log)");
          log("run error", { message: e?.message, stack: e?.stack });
        }
      });

      checkBtn.addEventListener("click", checkInjected);
    </script>
  </body>
</html>
